# : Manager [[[

[manager]
cwd = { fg = "#e6e3d6" }

# Tab
tab_active = { fg = "#313300", bg = "#c9cb77", bold = true }
tab_inactive = { fg = "#e6e890", bg = "#1c1d00" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#70d5aa", bg = "#70d5aa" }
marker_cut = { fg = "#bfecd9", bg = "#bfecd9" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#a3d0be", bg = "#a3d0be" }

# Count
count_copied = { fg = "#002117", bg = "#bfecd9" }
count_cut = { fg = "#002117", bg = "#bfecd9" }
count_selected = { fg = "#313300", bg = "#a3d0be" }

# Border
border_symbol = "│"
border_style  = { fg = "#c9cb77" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#313300", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#c9cb77", fg = "#313300", bold = true }
normal_alt  = { bg = "#48473a", fg = "#c9c7b6" }

# Select mode
select_main = { bg = "#c9c8a5", fg = "#313219", bold = true }
select_alt  = { bg = "#48473a", fg = "#c9c7b6" }

# Unset mode
unset_main = { bg = "#a3d0be", fg = "#0a372b", bold = true }
unset_alt  = { bg = "#48473a", fg = "#c9c7b6" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#c9cb77", bg = "#3a3a30" }
progress_error = { fg = "#ffb4ab", bg = "#3a3a30" }

# Permissions
permissions_t = { fg = "#858450" }
permissions_w = { fg = "#4a9074" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#49c993" }
permissions_s = { fg = "#b5b926" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#c9cb77" }
active = { fg = "#a3d0be", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#c9cb77" }
value = { fg = "#e6e3d6" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#c9cb77", bg = "#313300" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#c9cb77" }
title = {}
hovered = { fg = "#bfecd9", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3a3a30" }
cand = { fg = "#c9cb77" }
rest = { fg = "#313300" }
desc = { fg = "#e6e3d6" }
separator = " ▶ "
separator_style = { fg = "#e6e3d6" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e6e3d6" }
run = { fg = "#e6e3d6" }
footer = { fg = "#313219", bg = "#c9c8a5" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#a3d0be" }
title_warn = { fg = "#c9cb77" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e6e3d6" },
    { name = "*/", fg = "#c9cb77" },
]

# : ]]]

