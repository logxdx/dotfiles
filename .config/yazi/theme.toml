# : Manager [[[

[manager]
cwd = { fg = "#e4e3d7" }

# Tab
tab_active = { fg = "#2b3400", bg = "#c0ce7e", bold = true }
tab_inactive = { fg = "#dcea97", bg = "#181e00" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#6ed5b9", bg = "#6ed5b9" }
marker_cut = { fg = "#bdecdf", bg = "#bdecdf" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#a1d0c4", bg = "#a1d0c4" }

# Count
count_copied = { fg = "#00201a", bg = "#bdecdf" }
count_cut = { fg = "#00201a", bg = "#bdecdf" }
count_selected = { fg = "#2b3400", bg = "#a1d0c4" }

# Border
border_symbol = "│"
border_style  = { fg = "#c0ce7e" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#2b3400", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#c0ce7e", fg = "#2b3400", bold = true }
normal_alt  = { bg = "#46483b", fg = "#c7c7b7" }

# Select mode
select_main = { bg = "#c5c9a8", fg = "#2e321b", bold = true }
select_alt  = { bg = "#46483b", fg = "#c7c7b7" }

# Unset mode
unset_main = { bg = "#a1d0c4", fg = "#04372f", bold = true }
unset_alt  = { bg = "#46483b", fg = "#c7c7b7" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#c0ce7e", bg = "#393a31" }
progress_error = { fg = "#ffb4ab", bg = "#393a31" }

# Permissions
permissions_t = { fg = "#7f8553" }
permissions_w = { fg = "#48907e" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#46caa5" }
permissions_s = { fg = "#a7c127" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#c0ce7e" }
active = { fg = "#a1d0c4", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#c0ce7e" }
value = { fg = "#e4e3d7" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#c0ce7e", bg = "#2b3400" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#c0ce7e" }
title = {}
hovered = { fg = "#bdecdf", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#393a31" }
cand = { fg = "#c0ce7e" }
rest = { fg = "#2b3400" }
desc = { fg = "#e4e3d7" }
separator = " ▶ "
separator_style = { fg = "#e4e3d7" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e4e3d7" }
run = { fg = "#e4e3d7" }
footer = { fg = "#2e321b", bg = "#c5c9a8" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#a1d0c4" }
title_warn = { fg = "#c0ce7e" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e4e3d7" },
    { name = "*/", fg = "#c0ce7e" },
]

# : ]]]

