# : Manager [[[

[manager]
cwd = { fg = "#f0dedf" }

# Tab
tab_active = { fg = "#561d29", bg = "#ffb2bd", bold = true }
tab_inactive = { fg = "#ffd9dd", bg = "#3b0715" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#ffab53", bg = "#ffab53" }
marker_cut = { fg = "#ffddb9", bg = "#ffddb9" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#eabf8f", bg = "#eabf8f" }

# Count
count_copied = { fg = "#2b1700", bg = "#ffddb9" }
count_cut = { fg = "#2b1700", bg = "#ffddb9" }
count_selected = { fg = "#561d29", bg = "#eabf8f" }

# Border
border_symbol = "│"
border_style  = { fg = "#ffb2bd" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#561d29", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#ffb2bd", fg = "#561d29", bold = true }
normal_alt  = { bg = "#524345", fg = "#d6c2c3" }

# Select mode
select_main = { bg = "#e5bdc1", fg = "#43292d", bold = true }
select_alt  = { bg = "#524345", fg = "#d6c2c3" }

# Unset mode
unset_main = { bg = "#eabf8f", fg = "#452b07", bold = true }
unset_alt  = { bg = "#524345", fg = "#d6c2c3" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#ffb2bd", bg = "#413738" }
progress_error = { fg = "#ffb4ab", bg = "#413738" }

# Permissions
permissions_t = { fg = "#ba4f5a" }
permissions_w = { fg = "#bd7423" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#ff9320" }
permissions_s = { fg = "#ff4054" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#ffb2bd" }
active = { fg = "#eabf8f", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffb2bd" }
value = { fg = "#f0dedf" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#ffb2bd", bg = "#561d29" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#ffb2bd" }
title = {}
hovered = { fg = "#ffddb9", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#413738" }
cand = { fg = "#ffb2bd" }
rest = { fg = "#561d29" }
desc = { fg = "#f0dedf" }
separator = " ▶ "
separator_style = { fg = "#f0dedf" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#f0dedf" }
run = { fg = "#f0dedf" }
footer = { fg = "#43292d", bg = "#e5bdc1" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#eabf8f" }
title_warn = { fg = "#ffb2bd" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#f0dedf" },
    { name = "*/", fg = "#ffb2bd" },
]

# : ]]]

