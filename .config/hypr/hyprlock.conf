source = colors.conf

# ANIMATIONS
animations {
    enabled = true
}

# BACKGROUND
background {
    monitor =
    path = $image
    color = $background
    blur_passes = 3
    contrast = 0.8
    brightness = 0.6
}

# GENERAL
general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 3
    disable_loading_bar = false
}

label { # Caps Lock Warning
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $primary
    font_size = 12
    font_family = FiraCode Nerd Font Mono
    position = 0, -350
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 120, 30
    outline_thickness = 2
    dots_size = 0.3 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.8 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $primary
    inner_color = rgba(255, 255, 255, 0.2)
    font_color = $primary
    fade_on_empty = true
    rounding = -1
    check_color = $error
    placeholder_text = <i><span foreground="##cdd6f4">Input Password...</span></i>
    hide_input = false
    position = 0, 125
    halign = center
    valign = bottom
}

# DAY
label {
  monitor =
  text = cmd[update:30000] echo "$(date +"%A")"
  color = $primary
  font_size = 25
  font_family = FiraCode Nerd Font Mono
  position = 75, 450
  halign = left
  valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:30000] echo "$(date +"%d %B %Y")"
  color = $secondary
  font_size = 20
  font_family = FiraCode Nerd Font Mono
  position = 75, 410
  halign = left
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] date +"%H"
  color = $primary
  font_size = 50
  font_family = FiraCode Nerd Font Mono
  position = -165, 425
  halign = right
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] date +"%M"
  color = $secondary
  font_size = 40
  font_family = FiraCode Nerd Font Mono
  position = -90, 422
  halign = right
  valign = center
}

# WELCOME
label {
    monitor =
    text = cmd[update:86400] echo "Welcome,"
    color = $secondary
    font_size = 75
    font_family = FiraCode Nerd Font Mono
    position = 30, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:86400] echo "$(/home/logx/scripts/whoami.sh)"
    color = $primary
    font_size = 120
    font_family = FiraCode Nerd Font Mono
    position = 0, 0
    halign = center
    valign = center
}


label { # Status
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    font_size = 15
    font_family = FiraCode Nerd Font Mono
    color = $primary
    position = 0, 50
    halign = center
    valign = bottom
}
