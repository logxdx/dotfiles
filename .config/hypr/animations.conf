#‚ĖĄ‚ĖÄ‚ĖĄ ‚Ėą‚ĖĄ ‚Ėą ‚Ėą ‚Ėą‚ĖĄ ‚ĖĄ‚Ėą ‚ĖĄ‚ĖÄ‚ĖĄ ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚ĖĄ‚ĖÄ‚ĖĄ ‚Ėą‚ĖĄ ‚Ėą ‚ĖĄ‚ĖÄ‚ĖÄ
#‚Ėą‚ĖÄ‚Ėą ‚Ėą ‚ĖÄ‚Ėą ‚Ėą ‚Ėą ‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą  ‚Ėą  ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą‚Ėą

animations {
    enabled = true

    bezier = zen,0.1,0.9,0.4,1.05
    bezier = cubicbz,0.20,0.80,0.20,0.90
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 1.0, zen
    animation = windowsIn, 1, 1.75, zen
    animation = windowsOut, 1, 1.25, zen
    animation = windowsMove, 1, 1.5, zen
    animation = fade, 1, 3.0, zen
    animation = fadeIn, 1, 2.5, zen
    animation = fadeOut, 1, 1.0, zen
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint
    animation = layersOut, 1, 1.5, easeOutQuint
    animation = fadeLayersIn, 1, 1.79, cubicbz
    animation = fadeLayersOut, 1, 1.39, cubicbz
    animation = workspaces, 1, 2.0, easeOutQuint
    animation = workspacesIn, 1, 1.0, easeOutQuint
    animation = workspacesOut, 1, 1.0, easeOutQuint

    # Animation curves
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = standard, 0.2, 0, 0, 1

    # Animation configs
    animation = layersIn, 1, 2, emphasizedDecel, slide
    animation = layersOut, 1, 2, emphasizedAccel, slide
    animation = fadeLayers, 1, 2, standard

    animation = windowsIn, 1, 2, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedAccel
    animation = windowsMove, 1, 3, standard
    animation = workspaces, 1, 2, standard

    animation = specialWorkspace, 1, 2, specialWorkSwitch, slidefadevert 15%

    animation = fade, 1, 3, standard
    animation = fadeDim, 1, 3, standard
    animation = border, 1, 2, standard
}

